<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match-Box Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00E676;
    --green-dim: #00C853;
    --dark: #0A0A0A;
    --dark2: #111111;
    --dark3: #1A1A1A;
    --dark4: #222222;
    --border: #2A2A2A;
    --text: #EFEFEF;
    --muted: #666;
    --amber: #FFB300;
    --red: #FF3D3D;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,10,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--green); }
  .topbar-divider { width: 1px; height: 20px; background: var(--border); }
  .topbar-badge { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .back-btn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px;
    padding: 6px 12px; cursor: pointer; transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--green); color: var(--green); }

  .tabs-bar { padding: 20px 24px 0; display: flex; gap: 4px; border-bottom: 1px solid var(--border); }
  .tab {
    padding: 10px 20px; background: none; border: none;
    border-bottom: 2px solid transparent; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s; margin-bottom: -1px;
  }
  .tab.active { color: var(--green); border-bottom-color: var(--green); }

  .content { padding: 24px; max-width: 800px; margin: 0 auto; }

  .date-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .date-display { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; line-height: 1; }
  .date-display small { display: block; font-family: 'DM Sans', sans-serif; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); font-weight: 400; margin-bottom: 4px; }
  .progress-pill { background: var(--dark3); border: 1px solid var(--border); border-radius: 100px; padding: 6px 16px; font-size: 13px; color: var(--muted); }
  .progress-pill b { color: var(--green); }

  .section-heading { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--text); margin-bottom: 16px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-input, .form-select {
    width: 100%; background: var(--dark2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--green); }
  .form-select option { background: var(--dark2); }
  .form-input.full { grid-column: 1 / -1; }

  .add-task-form { background: var(--dark3); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-top: 16px; }
  .add-btn { padding: 10px 20px; background: var(--green); border: none; border-radius: 10px; color: #000; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .add-btn:hover { background: var(--green-dim); }

  .admin-section { margin-bottom: 32px; }
  .admin-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 12px; }
  .admin-task-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .admin-task-row:last-child { border-bottom: none; }
  .admin-task-info { flex: 1; }
  .admin-task-title { font-size: 13px; color: var(--text); }
  .admin-task-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .toggle-btn { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
  .toggle-btn.active { background: rgba(0,230,118,0.1); color: var(--green); }
  .toggle-btn.inactive { background: rgba(255,61,61,0.1); color: var(--red); }

  .date-picker { background: var(--dark2); border: 1px solid var(--border); border-radius: 10px; padding: 9px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; cursor: pointer; }
  .date-picker:focus { border-color: var(--green); }

  /* Expenses */
  .summary-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
  .summary-card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .summary-card-amt { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; color: var(--text); line-height: 1; }

  .exp-entry { background: var(--dark2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 12px; }
  .exp-entry-left { flex: 1; }
  .exp-entry-desc { font-size: 14px; color: var(--text); margin-bottom: 3px; }
  .exp-entry-meta { font-size: 11px; color: var(--muted); }
  .exp-entry-inv { font-size: 11px; color: var(--green); margin-top: 2px; }
  .exp-entry-right { text-align: right; flex-shrink: 0; }
  .exp-amount { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--text); }
  .exp-cat-badge { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 1px; padding: 2px 8px; border-radius: 100px; background: rgba(0,230,118,0.08); color: var(--green); margin-right: 6px; }

  .lead-card {
    background: var(--dark2); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; display: flex; align-items: center; gap: 14px; margin-bottom: 8px;
  }
  .lead-info { flex: 1; }
  .lead-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .lead-meta { font-size: 11px; color: var(--muted); }
  .status-select {
    background: var(--dark3); border: 1px solid var(--border); border-radius: 8px;
    padding: 5px 10px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; cursor: pointer; outline: none; transition: all 0.2s;
    flex-shrink: 0;
  }
  .status-select.New { border-color: var(--muted); color: var(--muted); }
  .status-select.Contacted { border-color: var(--amber); color: var(--amber); }
  .status-select.In\ Discussion { border-color: var(--green); color: var(--green); }
  .status-select.Closed { border-color: #555; color: #555; }

  .loader { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--muted); font-size: 14px; gap: 10px; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">MB</div>
    <div class="topbar-divider"></div>
    <div class="topbar-badge">Admin Panel</div>
  </div>
  <button class="back-btn" onclick="window.location.href='checklist.html'">← Back to Checklist</button>
</div>

<div class="tabs-bar">
  <button class="tab active" onclick="switchTab('expenses', this)">Expenses</button>
  <button class="tab" onclick="switchTab('corporates', this)">Corporates</button>
  <button class="tab" onclick="switchTab('partners', this)">Partners</button>
  <button class="tab" onclick="switchTab('admin', this)">Manage</button>
</div>

<!-- EXPENSES TAB -->
<div class="content" id="tab-expenses">
  <div class="date-header">
    <div class="date-display"><small>Expenses</small><span id="exp-month-display">—</span></div>
    <div class="progress-pill">Total: <b id="exp-total-display">₹0</b></div>
  </div>

  <div style="display:flex;gap:10px;margin-bottom:24px;align-items:center;flex-wrap:wrap">
    <input type="month" class="date-picker" id="exp-month-picker" onchange="loadExpenses()">
    <select class="form-select" id="exp-cat-filter" onchange="loadExpenses()" style="width:auto">
      <option value="all">All Categories</option>
      <option value="Inventory">Inventory</option>
      <option value="Utilities">Utilities</option>
      <option value="Rent">Rent</option>
      <option value="Maintenance">Maintenance</option>
      <option value="Salaries">Salaries</option>
      <option value="Marketing">Marketing</option>
      <option value="Miscellaneous">Miscellaneous</option>
    </select>
  </div>

  <div id="exp-summary-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:28px"></div>

  <div class="add-task-form" style="margin-bottom:28px">
    <div style="font-size:13px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px">Log Expense / Purchase</div>
    <div class="form-row">
      <input class="form-input" id="exp-desc" placeholder="Description" />
      <input class="form-input" id="exp-amount" type="number" placeholder="Amount (₹)" inputmode="decimal" />
    </div>
    <div class="form-row">
      <select class="form-select" id="exp-category" onchange="toggleInvRow()">
        <option value="Inventory">Inventory</option>
        <option value="Utilities">Utilities</option>
        <option value="Rent">Rent</option>
        <option value="Maintenance">Maintenance</option>
        <option value="Salaries">Salaries</option>
        <option value="Marketing">Marketing</option>
        <option value="Miscellaneous">Miscellaneous</option>
      </select>
      <select class="form-select" id="exp-payment">
        <option value="Cash">Cash</option>
        <option value="UPI">UPI</option>
        <option value="Bank Transfer">Bank Transfer</option>
        <option value="Credit Card">Credit Card</option>
      </select>
    </div>
    <div id="inv-link-row" class="form-row" style="display:none">
      <select class="form-select" id="exp-inv-item">
        <option value="">— Link to inventory item (optional) —</option>
      </select>
      <input class="form-input" id="exp-inv-qty" type="number" placeholder="Qty purchased" inputmode="numeric" />
    </div>
    <div class="form-row">
      <input class="form-input" id="exp-date" type="date" />
      <button class="add-btn" onclick="logExpense()" style="white-space:nowrap">+ Log Expense</button>
    </div>
  </div>

  <div class="section-heading" style="margin-bottom:16px">Recent Entries</div>
  <div id="exp-log-container"><div class="loader"><div class="spinner"></div> Loading...</div></div>
</div>

<!-- CORPORATES TAB -->
<div class="content hidden" id="tab-corporates">
  <div class="date-header">
    <div class="date-display"><small>Leads</small>Corporates</div>
    <div id="corp-count" class="progress-pill">— entries</div>
  </div>

  <div class="add-task-form" style="margin-bottom:24px">
    <div style="font-size:13px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px">Add Corporate</div>
    <div class="form-row">
      <input class="form-input" id="corp-name" placeholder="Company name" />
      <input class="form-input" id="corp-phone" placeholder="Phone" inputmode="tel" />
    </div>
    <div class="form-row">
      <input class="form-input" id="corp-email" placeholder="Email" type="email" />
      <input class="form-input" id="corp-notes" placeholder="Notes (optional)" />
    </div>
    <button class="add-btn" onclick="addLead('corporate')">+ Add Corporate</button>
  </div>

  <div id="corp-container"><div class="loader"><div class="spinner"></div> Loading...</div></div>
</div>

<!-- PARTNERS TAB -->
<div class="content hidden" id="tab-partners">
  <div class="date-header">
    <div class="date-display"><small>Leads</small>Partners</div>
    <div id="part-count" class="progress-pill">— entries</div>
  </div>

  <div class="add-task-form" style="margin-bottom:24px">
    <div style="font-size:13px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px">Add Partner</div>
    <div class="form-row">
      <input class="form-input" id="part-name" placeholder="Brand / Partner name" />
      <input class="form-input" id="part-phone" placeholder="Phone" inputmode="tel" />
    </div>
    <div class="form-row">
      <input class="form-input" id="part-email" placeholder="Email" type="email" />
      <input class="form-input" id="part-notes" placeholder="Notes (optional)" />
    </div>
    <button class="add-btn" onclick="addLead('partner')">+ Add Partner</button>
  </div>

  <div id="part-container"><div class="loader"><div class="spinner"></div> Loading...</div></div>
</div>

<!-- ADMIN TAB -->
<div class="content hidden" id="tab-admin">
  <div class="admin-section">
    <div class="section-heading">Manage Tasks</div>
    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
      <select class="form-select" id="admin-role-filter" onchange="loadAdminTasks()" style="width:auto">
        <option value="AM">AM Tasks</option>
        <option value="OM">OM Tasks</option>
        <option value="BM">BM Tasks</option>
      </select>
      <select class="form-select" id="admin-freq-filter" onchange="loadAdminTasks()" style="width:auto">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
      </select>
    </div>
    <div id="admin-tasks-container"><div class="loader"><div class="spinner"></div> Loading...</div></div>
    <div class="add-task-form">
      <div style="font-size:13px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;">Add New Task</div>
      <div class="form-row">
        <input class="form-input full" id="new-task-title" placeholder="Task description" />
      </div>
      <div class="form-row">
        <input class="form-input" id="new-task-category" placeholder="Category" />
        <select class="form-select" id="new-task-role">
          <option value="AM">AM</option>
          <option value="OM">OM</option>
          <option value="BM">BM</option>
        </select>
      </div>
      <div class="form-row">
        <select class="form-select" id="new-task-freq">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
        <button class="add-btn" onclick="addTask()">+ Add Task</button>
      </div>
    </div>
  </div>

  <div class="admin-section">
    <div class="section-heading">User Management</div>
    <div class="admin-card" id="users-container"><div class="loader"><div class="spinner"></div> Loading...</div></div>
    <div class="add-task-form">
      <div style="font-size:13px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;">Add User</div>
      <div class="form-row">
        <input class="form-input" id="new-user-name" placeholder="Full name" />
        <input class="form-input" id="new-user-pin" placeholder="PIN (4-6 digits)" type="password" inputmode="numeric" maxlength="6" />
      </div>
      <div class="form-row">
        <select class="form-select" id="new-user-role">
          <option value="AM">AM - Arena Manager</option>
          <option value="OM">OM - Operations Manager</option>
          <option value="BM">BM - Bookings Manager</option>
          <option value="admin">Admin</option>
          <option value="manager">Manager</option>
        </select>
        <button class="add-btn" onclick="addUser()">+ Add User</button>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://rwgibsqdbunpicvporio.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3Z2lic3FkYnVucGljdnBvcmlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMjY4NDUsImV4cCI6MjA5MjYwMjg0NX0.yfh3-tcszfa_93l87wFN4Eb5FJPdNghV_B-U-ijrGR4';

const api = (path, opts={}) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
  headers: {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': opts.prefer || 'return=representation',
    ...opts.headers
  },
  ...opts
}).then(r => r.json());

const today = () => new Date().toLocaleDateString('en-CA');

// ── TABS ──
function switchTab(tab, btn) {
  document.querySelectorAll('.tabs-bar .tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['expenses','admin','corporates','partners'].forEach(t => document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab));
  if (tab === 'admin') { loadAdminTasks(); loadUsers(); }
  if (tab === 'corporates') { loadLeads('corporate'); }
  if (tab === 'partners') { loadLeads('partner'); }
}

// ── LEADS (Corporates & Partners) ──
async function loadLeads(type) {
  const containerId = type === 'corporate' ? 'corp-container' : 'part-container';
  const countId = type === 'corporate' ? 'corp-count' : 'part-count';
  const container = document.getElementById(containerId);
  container.innerHTML = `<div class="loader"><div class="spinner"></div> Loading...</div>`;

  const leads = await api(`leads?type=eq.${type}&order=created_at.desc&select=*`);
  document.getElementById(countId).textContent = `${leads.length} ${leads.length === 1 ? 'entry' : 'entries'}`;

  if (!leads.length) {
    container.innerHTML = `<div class="loader" style="color:var(--muted)">No ${type}s added yet</div>`;
    return;
  }

  container.innerHTML = leads.map(l => `
    <div class="lead-card">
      <div class="lead-info">
        <div class="lead-name">${l.name}</div>
        <div class="lead-meta">
          ${l.phone ? `📞 ${l.phone}` : ''}
          ${l.phone && l.email ? ' · ' : ''}
          ${l.email ? `✉️ ${l.email}` : ''}
          ${l.notes ? `<div style="margin-top:3px;color:var(--muted)">${l.notes}</div>` : ''}
        </div>
      </div>
      <select class="status-select ${l.status}" onchange="updateLeadStatus('${l.id}', this)">
        <option ${l.status==='New'?'selected':''}>New</option>
        <option ${l.status==='Contacted'?'selected':''}>Contacted</option>
        <option ${l.status==='In Discussion'?'selected':''}>In Discussion</option>
        <option ${l.status==='Closed'?'selected':''}>Closed</option>
      </select>
    </div>`).join('');
}

async function addLead(type) {
  const prefix = type === 'corporate' ? 'corp' : 'part';
  const name = document.getElementById(`${prefix}-name`).value.trim();
  const phone = document.getElementById(`${prefix}-phone`).value.trim();
  const email = document.getElementById(`${prefix}-email`).value.trim();
  const notes = document.getElementById(`${prefix}-notes`).value.trim();

  if (!name) { alert('Enter a name'); return; }

  await api('leads', {
    method: 'POST',
    body: JSON.stringify({ type, name, phone, email, notes, status: 'New' })
  });

  document.getElementById(`${prefix}-name`).value = '';
  document.getElementById(`${prefix}-phone`).value = '';
  document.getElementById(`${prefix}-email`).value = '';
  document.getElementById(`${prefix}-notes`).value = '';

  loadLeads(type);
}

async function updateLeadStatus(id, select) {
  const status = select.value;
  select.className = `status-select ${status}`;
  await api(`leads?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify({ status }) });
}

// ── EXPENSES ──
function toggleInvRow() {
  const cat = document.getElementById('exp-category').value;
  document.getElementById('inv-link-row').style.display = cat === 'Inventory' ? 'grid' : 'none';
}

function initExpenses() {
  const picker = document.getElementById('exp-month-picker');
  const now = new Date();
  picker.value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('exp-date').value = today();

  api('tasks?minimum_qty=not.is.null&is_active=eq.true&select=id,title').then(items => {
    const sel = document.getElementById('exp-inv-item');
    sel.innerHTML = '<option value="">— Link to inventory item (optional) —</option>';
    items.forEach(i => sel.innerHTML += `<option value="${i.id}">${i.title}</option>`);
  });

  loadExpenses();
}

async function loadExpenses() {
  const month = document.getElementById('exp-month-picker').value;
  const catFilter = document.getElementById('exp-cat-filter').value;
  if (!month) return;

  const [year, mon] = month.split('-');
  const startDate = `${year}-${mon}-01`;
  const endDate = new Date(year, mon, 0).toISOString().split('T')[0];

  document.getElementById('exp-month-display').textContent = new Date(year, mon-1).toLocaleDateString('en-IN', { month:'long', year:'numeric' });

  let query = `expenses?date=gte.${startDate}&date=lte.${endDate}&order=logged_at.desc&select=*`;
  if (catFilter !== 'all') query += `&category=eq.${catFilter}`;
  const expenses = await api(query);

  const totals = {};
  let grandTotal = 0;
  expenses.forEach(e => {
    totals[e.category] = (totals[e.category] || 0) + parseFloat(e.amount);
    grandTotal += parseFloat(e.amount);
  });

  document.getElementById('exp-total-display').textContent = `₹${grandTotal.toLocaleString('en-IN')}`;
  document.getElementById('exp-summary-grid').innerHTML = Object.entries(totals).map(([cat, amt]) => `
    <div class="summary-card">
      <div class="summary-card-label">${cat}</div>
      <div class="summary-card-amt">₹${amt.toLocaleString('en-IN')}</div>
    </div>`).join('');

  const container = document.getElementById('exp-log-container');
  if (!expenses.length) { container.innerHTML = `<div class="loader" style="color:var(--muted)">No expenses this month</div>`; return; }

  container.innerHTML = expenses.map(e => `
    <div class="exp-entry">
      <div class="exp-entry-left">
        <div class="exp-entry-desc"><span class="exp-cat-badge">${e.category}</span>${e.description}</div>
        <div class="exp-entry-meta">${new Date(e.date+'T00:00:00').toLocaleDateString('en-IN', {day:'numeric',month:'short'})} · ${e.payment_method || '—'}</div>
        ${e.linked_task_id ? `<div class="exp-entry-inv">↗ Updates inventory${e.quantity ? ` (+${e.quantity} units)` : ''}</div>` : ''}
      </div>
      <div class="exp-entry-right">
        <div class="exp-amount">₹${parseFloat(e.amount).toLocaleString('en-IN')}</div>
      </div>
    </div>`).join('');
}

async function logExpense() {
  const desc = document.getElementById('exp-desc').value.trim();
  const amount = parseFloat(document.getElementById('exp-amount').value);
  const category = document.getElementById('exp-category').value;
  const payment = document.getElementById('exp-payment').value;
  const date = document.getElementById('exp-date').value;
  const linkedTaskId = document.getElementById('exp-inv-item').value || null;
  const invQty = parseInt(document.getElementById('exp-inv-qty').value) || null;

  if (!desc || isNaN(amount) || amount <= 0 || !date) { alert('Fill in description, amount and date'); return; }
  if (category === 'Inventory' && linkedTaskId && !invQty) { alert('Enter quantity purchased'); return; }

  await api('expenses', {
    method: 'POST',
    body: JSON.stringify({ user_id: null, location: 'Hebbal', date, category, description: desc, amount, payment_method: payment, linked_task_id: linkedTaskId, quantity: invQty })
  });

  document.getElementById('exp-desc').value = '';
  document.getElementById('exp-amount').value = '';
  document.getElementById('exp-inv-qty').value = '';
  document.getElementById('exp-inv-item').value = '';
  document.getElementById('inv-link-row').style.display = 'none';

  loadExpenses();
}

// ── ADMIN: TASKS ──
async function loadAdminTasks() {
  const role = document.getElementById('admin-role-filter').value;
  const freq = document.getElementById('admin-freq-filter').value;
  const tasks = await api(`tasks?role=eq.${role}&frequency=eq.${freq}&select=*`);
  const container = document.getElementById('admin-tasks-container');
  if (!tasks.length) { container.innerHTML = `<div class="loader">No tasks yet</div>`; return; }

  let html = '<div class="admin-card">';
  tasks.forEach(t => {
    html += `<div class="admin-task-row">
      <div class="admin-task-info">
        <div class="admin-task-title">${t.title}</div>
        <div class="admin-task-meta">${t.category}</div>
      </div>
      <button class="toggle-btn ${t.is_active?'active':'inactive'}" onclick="toggleTaskActive('${t.id}', ${t.is_active})">
        ${t.is_active ? 'Active' : 'Inactive'}
      </button>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

async function toggleTaskActive(id, current) {
  await api(`tasks?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify({ is_active: !current }) });
  loadAdminTasks();
}

async function addTask() {
  const title = document.getElementById('new-task-title').value.trim();
  const category = document.getElementById('new-task-category').value.trim();
  const role = document.getElementById('new-task-role').value;
  const frequency = document.getElementById('new-task-freq').value;
  if (!title || !category) { alert('Fill in title and category'); return; }
  await api('tasks', { method: 'POST', body: JSON.stringify({ title, category, role, frequency }) });
  document.getElementById('new-task-title').value = '';
  document.getElementById('new-task-category').value = '';
  loadAdminTasks();
}

// ── ADMIN: USERS ──
async function loadUsers() {
  const users = await api('users?select=*');
  const container = document.getElementById('users-container');
  if (!users.length) { container.innerHTML = `<div class="loader">No users yet</div>`; return; }
  let html = '';
  users.forEach(u => {
    html += `<div class="admin-task-row">
      <div class="admin-task-info">
        <div class="admin-task-title">${u.name}</div>
        <div class="admin-task-meta">${u.role.toUpperCase()} · PIN: ${'•'.repeat(u.pin.length)}</div>
      </div>
      <button class="toggle-btn inactive" onclick="deleteUser('${u.id}', '${u.name}')">Remove</button>
    </div>`;
  });
  container.innerHTML = html;
}

async function addUser() {
  const name = document.getElementById('new-user-name').value.trim();
  const pin = document.getElementById('new-user-pin').value.trim();
  const role = document.getElementById('new-user-role').value;
  if (!name || !pin) { alert('Fill in name and PIN'); return; }
  if (pin.length < 4) { alert('PIN must be at least 4 digits'); return; }
  await api('users', { method: 'POST', body: JSON.stringify({ name, pin, role, location: 'Hebbal' }) });
  document.getElementById('new-user-name').value = '';
  document.getElementById('new-user-pin').value = '';
  loadUsers();
}

async function deleteUser(id, name) {
  if (!confirm(`Remove ${name}?`)) return;
  await api(`users?id=eq.${id}`, { method: 'DELETE', prefer: '' });
  loadUsers();
}

// Init on load
initExpenses();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match-Box Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00E676;
    --green-dim: #00C853;
    --dark: #0A0A0A;
    --dark2: #111111;
    --dark3: #1A1A1A;
    --dark4: #222222;
    --border: #2A2A2A;
    --text: #EFEFEF;
    --muted: #666;
    --amber: #FFB300;
    --red: #FF3D3D;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── LOGIN ── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--dark);
    position: relative;
  }

  #login-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(0,230,118,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-box {
    width: 100%;
    max-width: 380px;
    padding: 48px 40px;
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 20px;
    text-align: center;
    position: relative;
    animation: fadeUp 0.5s ease;
  }

  .login-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 3px;
    color: var(--green);
    line-height: 1;
    margin-bottom: 4px;
  }

  .login-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .role-selector {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }

  .role-btn {
    padding: 10px 6px;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .role-btn.active {
    background: rgba(0,230,118,0.1);
    border-color: var(--green);
    color: var(--green);
  }

  .role-badge {
    display: block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    margin-bottom: 2px;
  }

  .pin-label {
    font-size: 12px;
    color: var(--muted);
    text-align: left;
    margin-bottom: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .pin-input {
    width: 100%;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 22px;
    letter-spacing: 8px;
    color: var(--text);
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }

  .pin-input:focus { border-color: var(--green); }

  .login-btn {
    width: 100%;
    padding: 14px;
    background: var(--green);
    border: none;
    border-radius: 12px;
    color: #000;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .login-btn:hover { background: var(--green-dim); transform: translateY(-1px); }
  .login-btn:active { transform: translateY(0); }

  .login-error {
    margin-top: 12px;
    font-size: 13px;
    color: var(--red);
    min-height: 18px;
  }

  /* ── APP SHELL ── */
  #app { display: none; min-height: 100vh; }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .topbar-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: var(--green);
  }

  .topbar-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  .topbar-info {
    font-size: 13px;
    color: var(--muted);
  }

  .topbar-info span {
    color: var(--text);
    font-weight: 500;
  }

  .logout-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  /* ── TABS ── */
  .tabs-bar {
    padding: 20px 24px 0;
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    padding: 10px 20px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: -1px;
  }

  .tab.active {
    color: var(--green);
    border-bottom-color: var(--green);
  }

  /* ── CONTENT ── */
  .content {
    padding: 24px;
    max-width: 800px;
    margin: 0 auto;
  }

  .date-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .date-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    color: var(--text);
    line-height: 1;
  }

  .date-display small {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 400;
    margin-bottom: 4px;
  }

  .progress-pill {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 13px;
    color: var(--muted);
  }

  .progress-pill b { color: var(--green); }

  /* past date banner */
  .past-banner {
    background: rgba(255,179,0,0.08);
    border: 1px solid rgba(255,179,0,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--amber);
    margin-bottom: 20px;
    display: none;
    align-items: center;
    gap: 8px;
  }

  /* category section */
  .category-block {
    margin-bottom: 24px;
    animation: fadeUp 0.4s ease;
  }

  .category-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 4px;
  }

  .task-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
    transition: all 0.2s;
    cursor: pointer;
  }

  .task-card:hover { border-color: #333; background: var(--dark3); }

  .task-card.done {
    border-color: rgba(0,230,118,0.2);
    background: rgba(0,230,118,0.04);
  }

  .task-card.locked { cursor: default; opacity: 0.7; }
  .task-card.locked:hover { background: var(--dark2); border-color: var(--border); }

  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .task-card.done .checkbox {
    background: var(--green);
    border-color: var(--green);
  }

  .checkbox svg { display: none; }
  .task-card.done .checkbox svg { display: block; }

  .task-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.4;
    flex: 1;
  }

  .task-card.done .task-text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: rgba(255,255,255,0.2);
  }

  /* Admin panel */
  .admin-section {
    margin-bottom: 32px;
  }

  .section-heading {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--text);
    margin-bottom: 16px;
  }

  .admin-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 12px;
  }

  .admin-task-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .admin-task-row:last-child { border-bottom: none; }

  .admin-task-info { flex: 1; }
  .admin-task-title { font-size: 13px; color: var(--text); }
  .admin-task-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .toggle-btn {
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }

  .toggle-btn.active { background: rgba(0,230,118,0.1); color: var(--green); }
  .toggle-btn.inactive { background: rgba(255,61,61,0.1); color: var(--red); }

  .add-task-form {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-top: 16px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .form-input, .form-select {
    width: 100%;
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-select:focus { border-color: var(--green); }
  .form-select option { background: var(--dark2); }

  .form-input.full { grid-column: 1 / -1; }

  .add-btn {
    padding: 10px 20px;
    background: var(--green);
    border: none;
    border-radius: 10px;
    color: #000;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .add-btn:hover { background: var(--green-dim); }

  /* Loading */
  .loader {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    color: var(--muted);
    font-size: 14px;
    gap: 10px;
  }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* History view */
  .history-controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    align-items: center;
  }

  .date-picker {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }

  .date-picker:focus { border-color: var(--green); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 1px;
    color: var(--green);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 4px;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">MATCH-BOX</div>
    <div class="login-sub">Daily Operations</div>

    <div class="role-selector">
      <button class="role-btn active" data-role="AM" onclick="selectRole(this)">
        <span class="role-badge">AM</span>Arena Mgr
      </button>
      <button class="role-btn" data-role="OM" onclick="selectRole(this)">
        <span class="role-badge">OM</span>Ops Mgr
      </button>
      <button class="role-btn" data-role="BM" onclick="selectRole(this)">
        <span class="role-badge">BM</span>Booking Mgr
      </button>
    </div>

    <div class="pin-label">Enter PIN</div>
    <input class="pin-input" type="password" inputmode="numeric" maxlength="6" id="pin-input" placeholder="••••" onkeydown="if(event.key==='Enter') doLogin()">
    <button class="login-btn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">MB</div>
      <div class="topbar-divider"></div>
      <div class="topbar-info">Signed in as <span id="user-name-display">—</span> · <span id="user-role-display">—</span></div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Sign out</button>
  </div>

  <div class="tabs-bar" id="tabs-bar">
    <button class="tab active" onclick="switchTab('checklist', this)">Checklist</button>
    <button class="tab" onclick="switchTab('history', this)">History</button>
    <button class="tab hidden" id="admin-tab" onclick="switchTab('admin', this)">Admin</button>
  </div>

  <!-- CHECKLIST TAB -->
  <div class="content" id="tab-checklist">
    <div class="date-header">
      <div class="date-display">
        <small>Today</small>
        <span id="today-display">—</span>
      </div>
      <div class="progress-pill"><b id="done-count">0</b> / <span id="total-count">0</span> done</div>
    </div>
    <div class="past-banner" id="past-banner">⚠️ You are viewing a past date. This checklist is locked.</div>

    <div class="tabs-bar" style="padding:0; margin-bottom:20px; border-bottom:1px solid var(--border);">
      <button class="tab active" onclick="switchFreq('daily', this)">Daily</button>
      <button class="tab" onclick="switchFreq('weekly', this)">Weekly</button>
      <button class="tab" onclick="switchFreq('monthly', this)">Monthly</button>
    </div>

    <div id="tasks-container"><div class="loader"><div class="spinner"></div> Loading tasks...</div></div>
  </div>

  <!-- HISTORY TAB -->
  <div class="content hidden" id="tab-history">
    <div class="history-controls">
      <input type="date" class="date-picker" id="history-date" onchange="loadHistory()">
      <select class="form-select" id="history-freq" onchange="loadHistory()" style="width:auto">
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
        <option value="monthly">Monthly</option>
      </select>
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="h-total">—</div><div class="stat-label">Total Tasks</div></div>
      <div class="stat-card"><div class="stat-num" id="h-done">—</div><div class="stat-label">Completed</div></div>
      <div class="stat-card"><div class="stat-num" id="h-pct">—</div><div class="stat-label">% Done</div></div>
    </div>
    <div id="history-container"><div class="loader"><div class="spinner"></div> Select a date above</div></div>
  </div>

  <!-- ADMIN TAB -->
  <div class="content hidden" id="tab-admin">
    <div class="admin-section">
      <div class="section-heading">Manage Tasks</div>

      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <select class="form-select" id="admin-role-filter" onchange="loadAdminTasks()" style="width:auto">
          <option value="AM">AM Tasks</option>
          <option value="OM">OM Tasks</option>
          <option value="BM">BM Tasks</option>
        </select>
        <select class="form-select" id="admin-freq-filter" onchange="loadAdminTasks()" style="width:auto">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="monthly">Monthly</option>
        </select>
      </div>

      <div id="admin-tasks-container"><div class="loader"><div class="spinner"></div> Loading...</div></div>

      <div class="add-task-form">
        <div style="font-size:13px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;">Add New Task</div>
        <div class="form-row">
          <input class="form-input full" id="new-task-title" placeholder="Task description" />
        </div>
        <div class="form-row">
          <input class="form-input" id="new-task-category" placeholder="Category" />
          <select class="form-select" id="new-task-role">
            <option value="AM">AM</option>
            <option value="OM">OM</option>
            <option value="BM">BM</option>
          </select>
        </div>
        <div class="form-row">
          <select class="form-select" id="new-task-freq">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
          </select>
          <button class="add-btn" onclick="addTask()">+ Add Task</button>
        </div>
      </div>
    </div>

    <div class="admin-section">
      <div class="section-heading">User Management</div>
      <div class="admin-card" id="users-container"><div class="loader"><div class="spinner"></div> Loading...</div></div>
      <div class="add-task-form">
        <div style="font-size:13px;font-weight:600;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;">Add User</div>
        <div class="form-row">
          <input class="form-input" id="new-user-name" placeholder="Full name" />
          <input class="form-input" id="new-user-pin" placeholder="PIN (4-6 digits)" type="password" inputmode="numeric" maxlength="6" />
        </div>
        <div class="form-row">
          <select class="form-select" id="new-user-role">
            <option value="AM">AM - Arena Manager</option>
            <option value="OM">OM - Operations Manager</option>
            <option value="BM">BM - Bookings Manager</option>
            <option value="admin">Admin</option>
            <option value="manager">Manager</option>
          </select>
          <button class="add-btn" onclick="addUser()">+ Add User</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://rwgibsqdbunpicvporio.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ3Z2lic3FkYnVucGljdnBvcmlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwMjY4NDUsImV4cCI6MjA5MjYwMjg0NX0.yfh3-tcszfa_93l87wFN4Eb5FJPdNghV_B-U-ijrGR4';

const api = (path, opts={}) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
  headers: {
    'apikey': SUPABASE_KEY,
    'Authorization': `Bearer ${SUPABASE_KEY}`,
    'Content-Type': 'application/json',
    'Prefer': opts.prefer || 'return=representation',
    ...opts.headers
  },
  ...opts
}).then(r => r.json());

let currentUser = null;
let currentFreq = 'daily';
let currentTab = 'checklist';
let allTasks = [];
let allEntries = [];
let isToday = true;

// ── DATE HELPERS ──
const today = () => new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD
const fmtDate = d => new Date(d + 'T00:00:00').toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

// ── LOGIN ──
let selectedRole = 'AM';
function selectRole(btn) {
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedRole = btn.dataset.role;
}

async function doLogin() {
  const pin = document.getElementById('pin-input').value.trim();
  const err = document.getElementById('login-error');
  err.textContent = '';
  if (!pin) { err.textContent = 'Enter your PIN'; return; }

  const users = await api(`users?pin=eq.${pin}&role=eq.${selectedRole}&select=*`);
  if (!users.length) {
    // check admin/manager
    const admins = await api(`users?pin=eq.${pin}&select=*`);
    if (admins.length && (admins[0].role === 'admin' || admins[0].role === 'manager')) {
      loginSuccess(admins[0]);
    } else {
      err.textContent = 'Wrong PIN or role. Try again.';
    }
    return;
  }
  loginSuccess(users[0]);
}

function loginSuccess(user) {
  currentUser = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-name-display').textContent = user.name;
  document.getElementById('user-role-display').textContent = user.role.toUpperCase();
  document.getElementById('today-display').textContent = fmtDate(today());

  // Show admin tab only for admin
  if (user.role === 'admin') {
    document.getElementById('admin-tab').classList.remove('hidden');
    loadAdminTasks();
    loadUsers();
  }

  // History tab for manager + admin
  if (user.role !== 'AM' && user.role !== 'OM' && user.role !== 'BM') {
    // manager / admin — set history date
    document.getElementById('history-date').value = today();
  }

  loadChecklist();
}

function doLogout() {
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('pin-input').value = '';
  document.getElementById('login-error').textContent = '';
}

// ── TABS ──
function switchTab(tab, btn) {
  document.querySelectorAll('.tabs-bar .tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTab = tab;
  ['checklist','history','admin'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
  });
  if (tab === 'history' && !document.getElementById('history-date').value) {
    document.getElementById('history-date').value = today();
    loadHistory();
  }
  if (tab === 'admin') { loadAdminTasks(); loadUsers(); }
}

function switchFreq(freq, btn) {
  document.querySelectorAll('#tab-checklist .tabs-bar .tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFreq = freq;
  renderTasks();
}

// ── CHECKLIST ──
async function loadChecklist(date) {
  const d = date || today();
  isToday = d === today();
  document.getElementById('past-banner').style.display = isToday ? 'none' : 'flex';

  // role: AM/OM/BM staff see their role's tasks; manager/admin see all
  let taskQuery = `tasks?is_active=eq.true&select=*`;
  if (['AM','OM','BM'].includes(currentUser.role)) {
    taskQuery += `&role=eq.${currentUser.role}`;
  }
  allTasks = await api(taskQuery);

  const taskIds = allTasks.map(t => t.id).join(',');
  if (taskIds) {
    allEntries = await api(`checklist_entries?task_id=in.(${taskIds})&date=eq.${d}&select=*`);
  } else {
    allEntries = [];
  }
  renderTasks();
}

function renderTasks() {
  const container = document.getElementById('tasks-container');
  const filtered = allTasks.filter(t => t.frequency === currentFreq);

  if (!filtered.length) {
    container.innerHTML = `<div class="loader" style="color:var(--muted)">No ${currentFreq} tasks found</div>`;
    updateProgress(0, 0);
    return;
  }

  const categories = [...new Set(filtered.map(t => t.category))];
  const doneIds = new Set(allEntries.filter(e => e.is_done).map(e => e.task_id));
  const locked = !isToday || currentUser.role === 'manager' || currentUser.role === 'admin';

  let html = '';
  categories.forEach(cat => {
    const tasks = filtered.filter(t => t.category === cat);
    html += `<div class="category-block">
      <div class="category-title">${cat}</div>`;
    tasks.forEach(t => {
      const done = doneIds.has(t.id);
      html += `<div class="task-card ${done?'done':''} ${locked?'locked':''}" 
        onclick="${locked?'':` toggleTask('${t.id}')`}" data-id="${t.id}">
        <div class="checkbox">
          <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
            <path d="M1 5L4.5 8.5L11 1" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="task-text">${t.title}</div>
      </div>`;
    });
    html += `</div>`;
  });

  container.innerHTML = html;

  const total = filtered.length;
  const done = filtered.filter(t => doneIds.has(t.id)).length;
  updateProgress(done, total);
}

function updateProgress(done, total) {
  document.getElementById('done-count').textContent = done;
  document.getElementById('total-count').textContent = total;
}

async function toggleTask(taskId) {
  if (!isToday) return;
  const existing = allEntries.find(e => e.task_id === taskId);
  const card = document.querySelector(`[data-id="${taskId}"]`);

  if (existing) {
    const newDone = !existing.is_done;
    await api(`checklist_entries?id=eq.${existing.id}`, {
      method: 'PATCH',
      prefer: 'return=representation',
      body: JSON.stringify({ is_done: newDone, submitted_at: newDone ? new Date().toISOString() : null })
    });
    existing.is_done = newDone;
  } else {
    const entry = {
      task_id: taskId,
      user_id: currentUser.id,
      location: currentUser.location || 'Hebbal',
      date: today(),
      is_done: true,
      submitted_at: new Date().toISOString()
    };
    const res = await api('checklist_entries', { method: 'POST', body: JSON.stringify(entry) });
    if (res[0]) allEntries.push(res[0]);
  }
  renderTasks();
}

// ── HISTORY ──
async function loadHistory() {
  const date = document.getElementById('history-date').value;
  const freq = document.getElementById('history-freq').value;
  if (!date) return;

  const container = document.getElementById('history-container');
  container.innerHTML = `<div class="loader"><div class="spinner"></div> Loading...</div>`;

  let taskQuery = `tasks?is_active=eq.true&frequency=eq.${freq}&select=*`;
  if (['AM','OM','BM'].includes(currentUser.role)) taskQuery += `&role=eq.${currentUser.role}`;
  const tasks = await api(taskQuery);

  const taskIds = tasks.map(t => t.id).join(',');
  const entries = taskIds ? await api(`checklist_entries?task_id=in.(${taskIds})&date=eq.${date}&select=*`) : [];
  const doneIds = new Set(entries.filter(e => e.is_done).map(e => e.task_id));

  document.getElementById('h-total').textContent = tasks.length;
  document.getElementById('h-done').textContent = doneIds.size;
  document.getElementById('h-pct').textContent = tasks.length ? Math.round(doneIds.size/tasks.length*100)+'%' : '—';

  if (!tasks.length) { container.innerHTML = `<div class="loader">No tasks found</div>`; return; }

  const cats = [...new Set(tasks.map(t => t.category))];
  let html = '';
  cats.forEach(cat => {
    html += `<div class="category-block"><div class="category-title">${cat}</div>`;
    tasks.filter(t => t.category === cat).forEach(t => {
      const done = doneIds.has(t.id);
      html += `<div class="task-card ${done?'done':''} locked">
        <div class="checkbox"><svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5L4.5 8.5L11 1" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <div class="task-text">${t.title}</div>
      </div>`;
    });
    html += `</div>`;
  });
  container.innerHTML = html;
}

// ── ADMIN: TASKS ──
async function loadAdminTasks() {
  const role = document.getElementById('admin-role-filter').value;
  const freq = document.getElementById('admin-freq-filter').value;
  const tasks = await api(`tasks?role=eq.${role}&frequency=eq.${freq}&select=*`);
  const container = document.getElementById('admin-tasks-container');

  if (!tasks.length) { container.innerHTML = `<div class="loader">No tasks yet</div>`; return; }

  let html = '<div class="admin-card">';
  tasks.forEach(t => {
    html += `<div class="admin-task-row">
      <div class="admin-task-info">
        <div class="admin-task-title">${t.title}</div>
        <div class="admin-task-meta">${t.category}</div>
      </div>
      <button class="toggle-btn ${t.is_active?'active':'inactive'}" onclick="toggleTaskActive('${t.id}', ${t.is_active})">
        ${t.is_active ? 'Active' : 'Inactive'}
      </button>
    </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

async function toggleTaskActive(id, current) {
  await api(`tasks?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify({ is_active: !current }) });
  loadAdminTasks();
}

async function addTask() {
  const title = document.getElementById('new-task-title').value.trim();
  const category = document.getElementById('new-task-category').value.trim();
  const role = document.getElementById('new-task-role').value;
  const frequency = document.getElementById('new-task-freq').value;
  if (!title || !category) { alert('Fill in title and category'); return; }
  await api('tasks', { method: 'POST', body: JSON.stringify({ title, category, role, frequency }) });
  document.getElementById('new-task-title').value = '';
  document.getElementById('new-task-category').value = '';
  loadAdminTasks();
}

// ── ADMIN: USERS ──
async function loadUsers() {
  const users = await api('users?select=*');
  const container = document.getElementById('users-container');
  if (!users.length) { container.innerHTML = `<div class="loader">No users yet</div>`; return; }

  let html = '';
  users.forEach(u => {
    html += `<div class="admin-task-row">
      <div class="admin-task-info">
        <div class="admin-task-title">${u.name}</div>
        <div class="admin-task-meta">${u.role.toUpperCase()} · PIN: ${'•'.repeat(u.pin.length)}</div>
      </div>
      <button class="toggle-btn inactive" onclick="deleteUser('${u.id}', '${u.name}')">Remove</button>
    </div>`;
  });
  container.innerHTML = html;
}

async function addUser() {
  const name = document.getElementById('new-user-name').value.trim();
  const pin = document.getElementById('new-user-pin').value.trim();
  const role = document.getElementById('new-user-role').value;
  if (!name || !pin) { alert('Fill in name and PIN'); return; }
  if (pin.length < 4) { alert('PIN must be at least 4 digits'); return; }
  await api('users', { method: 'POST', body: JSON.stringify({ name, pin, role, location: 'Hebbal' }) });
  document.getElementById('new-user-name').value = '';
  document.getElementById('new-user-pin').value = '';
  loadUsers();
}

async function deleteUser(id, name) {
  if (!confirm(`Remove ${name}?`)) return;
  await api(`users?id=eq.${id}`, { method: 'DELETE', prefer: '' });
  loadUsers();
}
</script>
